# config/services.yaml
parameters:
    # Paramètres personnalisés peuvent être ajoutés ici
    # Exemple : 
    # locale: 'fr'
    # app.supported_locales: ['fr', 'en']

services:

    App\Service\PdfGeneratorService: ~

    # Configuration par défaut pour tous les services
    _defaults:
        autowire: true      # Injection automatique des dépendances
        autoconfigure: true # Auto-enregistrement comme Commandes, EventSubscribers, etc.
        public: false       # Par défaut, les services sont privés

    # Enregistrement automatique de tous les fichiers dans src/ comme services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Tests/'

    # Configuration explicite pour les contrôleurs
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']
        public: true        # Les contrôleurs doivent être publics

    # Exemples de services personnalisés :
    # App\Service\MyCustomService:
    #     arguments:
    #         $someParam: '%app.some_parameter%'

    # Pour désactiver l'autowiring pour un service spécifique :
    # App\Some\LegacyService:
    #     autowire: false