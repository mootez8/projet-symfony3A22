security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            memory: null

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        back_office:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: back_office_login
                check_path: back_office_login
            logout:
                path: back_office_logout

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        # Exemple de restriction (décommente selon tes besoins)
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
